<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#BB1919">
  <title>News Reader</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Feed View ─────────────────────────────────────────── -->
  <div id="feed-view" class="view active">
    <header class="top-bar">
      <button class="icon-btn" id="btn-prev" aria-label="Previous feed" title="Previous feed">&#8249;</button>

      <div class="feed-header-center">
        <div class="feed-title-row">
          <img id="feed-favicon" class="feed-favicon" src="" alt="" aria-hidden="true">
          <h1 id="feed-title">Loading…</h1>
        </div>
        <div id="feed-dots" class="feed-dots"></div>
      </div>

      <!-- Settings -->
      <button class="icon-btn" id="btn-settings" aria-label="Settings" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>

      <button class="icon-btn" id="btn-next" aria-label="Next feed" title="Next feed">&#8250;</button>
    </header>

    <div id="feed-status" class="feed-status hidden"></div>

    <main id="feed-container" class="feed-container">
      <!-- Cards injected here via JS -->
    </main>
  </div>

  <!-- ── Article View ───────────────────────────────────────── -->
  <div id="article-view" class="view">
    <header class="top-bar article-bar">
      <button class="icon-btn" id="btn-back" aria-label="Back to feed">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Back</span>
      </button>
      <span id="article-site" class="article-site-name"></span>
      <a id="btn-open-browser" class="icon-btn open-browser-btn" target="_blank" rel="noopener" aria-label="Open in browser">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>
    </header>
    <div id="article-scroll" class="article-scroll">
      <div id="article-content" class="article-content"></div>
    </div>
  </div>

  <!-- ── Settings Panel ─────────────────────────────────────── -->
  <div id="settings-panel" class="settings-panel">
    <div class="settings-overlay" id="settings-overlay"></div>
    <div class="settings-sheet">
      <div class="settings-header">
        <h2>Feeds</h2>
        <button class="icon-btn" id="btn-close-settings" aria-label="Close settings">&#10005;</button>
      </div>
      <div class="settings-layout-section">
        <div class="settings-layout-label">Layout</div>
        <div class="layout-btn-group">
          <button class="layout-btn" data-layout="full">Full</button>
          <button class="layout-btn" data-layout="medium">Medium</button>
          <button class="layout-btn" data-layout="compact">Compact</button>
          <button class="layout-btn" data-layout="list">List</button>
        </div>
      </div>
      <div id="settings-feed-list" class="settings-feed-list"></div>
      <div class="settings-add-category-row">
        <button id="btn-add-category" class="btn-add-category">+ New Category</button>
      </div>
      <div class="settings-add">
        <h3>Add Feed</h3>
        <input type="text" id="input-feed-name" placeholder="Feed name"    autocomplete="off">
        <input type="url"  id="input-feed-url"  placeholder="RSS feed URL" autocomplete="off">
        <select id="input-feed-category" class="category-select"></select>
        <button id="btn-add-feed" class="btn-primary">Add Feed</button>
      </div>
    </div>
  </div>

  <!-- ── Category Move Picker ──────────────────────────────── -->
  <div id="cat-picker" class="sort-picker">
    <div class="sort-picker-overlay" id="cat-picker-overlay"></div>
    <div class="sort-picker-sheet">
      <div class="sort-picker-title">Move to category</div>
      <div id="cat-picker-options"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
